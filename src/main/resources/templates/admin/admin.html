<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>admin</title>
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>
<div class="admin">
    <div class="admin-con">
        <div th:replace="~{fragments/admin/admin_left :: adminLeftFragment}"></div>
        <div class="right">
            <div th:replace="~{fragments/admin/admin_header :: adminHeaderFragment}"></div>
            <div class="admin-list">
                <th:block th:if="${key=='member'}">
                    <th:block th:replace="~{fragments/admin/admin_member :: adminMemberFragment}"></th:block>
                </th:block>
                <th:block th:if="${key=='itemInsert'}">
                    <th:block th:replace="~{fragments/admin/admin_itemInsert :: adminItemInsertFragment}"></th:block>
                </th:block>
                <th:block th:if="${key=='itemList'}">
                    <th:block th:replace="~{fragments/admin/admin_itemList :: adminItemListFragment}"></th:block>
                </th:block>
                <th:block th:if="${key=='itemDetail'}">
                    <th:block th:replace="~{fragments/admin/admin_itemDetail :: adminItemDetailFragment}"></th:block>
                </th:block>
                <th:block th:if="${key=='weather'}">
                    <th:block th:replace="~{fragments/admin/admin_weather :: adminWeatherFragment}"></th:block>
                </th:block>
                <th:block th:if="${key=='scene'}">
                    <th:block th:replace="~{fragments/admin/admin_scene :: adminSceneFragment}"></th:block>
                </th:block>
                <th:block th:if="${key=='bus'}">
                    <th:block th:replace="~{fragments/admin/admin_bus :: adminBusFragment}"></th:block>
                </th:block>
                <th:block th:if="${key=='chat'}">
                    <th:block th:replace="~{fragments/admin/admin_chat :: adminChatFragment}"></th:block>
                </th:block>
                <th:block th:if="${key=='community'}">
                    <th:block th:replace="~{fragments/admin/admin_community :: adminCommunityFragment}"></th:block>
                </th:block>
            </div>
        </div>
    </div>
</div>
</body>
</html>
