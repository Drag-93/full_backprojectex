<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>게시글리스트</title>
    <link rel="stylesheet" th:href="@{/css/community/index.css}">
</head>
<body>
<div th:replace="~{fragments/common/header :: headerFragment}"></div>
<div class="community">
    <div class="community-con">
            <div class="search">
                <h3>게시글목록 </h3>

                <form th:action="@{/community/communityList}">
                    <select name="subject" id="subject">
                        <option value="" th:selected="${#strings.isEmpty( param.subject )}">::선택::</option>
                        <option value="title" th:selected="${#strings.equals( param.subject, 'title' )}">제목
                        </option>
                        <option value="content" th:selected="${#strings.equals( param.subject, 'content' )}">내용
                        </option>
                        <option value="nickName" th:selected="${#strings.equals( param.subject, 'nickName' )}">작성자</option>
                        <option value="category" th:selected="${#strings.equals( param.subject, 'category' )}">카테고리</option>
                    </select>
                    <input type="text" name="search" id="search" th:value="${param.search}">
                    <input type="submit" value="검색"/>
                </form>
            </div>
        <div class="write-btn">
<!--            접속o -> 글쓰기 이동
            접속X -> alert 로그인 페이지 이동-->
            <th:block sec:authorize="isAuthenticated()">
            <a th:href="@{/community/write}">글쓰기</a>
            </th:block>
                <th:block sec:authorize="isAnonymous()">
                    <span>로그인 후 작성 하실 수 있습니다</span>
                </th:block>

        </div>
        <div class="community-table">
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>카테고리</th>
        <th>제목</th>
        <th>내용</th>
        <th>파일유무</th>
        <th>작성자</th>
        <th>작성일</th>
        <th>조회수</th>
        <th>보기</th>

    </tr>
    </thead>
    <tbody>
    <th:block th:each="communityList:${communityList}">
        <tr>
            <td th:text="${communityList.id}"></td>
            <td th:text="${communityList.category}"></td>
            <td th:text="${communityList.title}"></td>
            <td th:text="${communityList.content}"></td>
            <td th:if="${communityList.attachFile == 1}">O</td>
            <td th:unless="${communityList.attachFile == 1}">X</td>
            <td th:text="${communityList.nickName}"></td>
            <td th:text="${#temporals.format(communityList.createTime, 'yyyy-MM-dd HH:mm:ss')}"></td>
            <td th:text="${communityList.count}"></td>
            <td>
                <a th:href="@{/community/detail/{id}(id=${communityList.id})}">
                    보기
                </a>
            </td>
        </tr>
    </th:block>
    </tbody>

</table>

        </div>
    </div>
    <div class="paging">
        <ul>
            <!-- 처음-->
            <li>
                <span th:if="${newPage==0}" class="span0">START</span>
                <span th:unless="${newPage==0}">
                <a th:href="@{/community/communityList(page=0, subject=${param.subject}, search=${param.search})}" class="span1">처음</a>
            </span>
            </li>
            <!--        이전-->
            <li>
                <span th:if="${newPage==0}" class="span0">PRE</span>
                <span th:unless="${newPage==0}">
                <a th:href="@{/community/communityList(page=${newPage - 1}, subject=${param.subject}, search=${param.search})}" class="span1">이전</a>
            </span>
            </li>
            <!--        페이지 번호-->
            <li th:each="i:${#numbers.sequence(startPage,endPage)}" class="block">
            <span th:if="${i==newPage + 1}"
                  th:text="${i}" class="now"></span>
                <a th:unless="${i==newPage + 1}"
                   th:href="@{/community/communityList(page=${i - 1}, subject=${param.subject}, search=${param.search})}"
                   th:text="${i}"></a>
            </li>
            <!--        다음-->
            <li>
                <span th:if="${newPage + 1 == communityList.totalPages}" class="span0">NEXT</span>
                <span th:unless="${newPage + 1 == communityList.totalPages}">
                <a th:href="@{/community/communityList(page=${newPage + 1}, subject=${param.subject}, search=${param.search})}" class="span1">다음</a>
            </span>
            </li>
            <!--        마지막-->
            <li>
                <span th:if="${newPage + 1 == communityList.totalPages}" class="span0">END</span>
                <span th:unless="${newPage + 1 == communityList.totalPages}">
                <a th:href="@{/community/communityList(page=${communityList.totalPages - 1}, subject=${param.subject}, search=${param.search})}" class="span1">마지막</a>
            </span>
            </li>
        </ul>
    </div>
</div>
<div th:replace="~{fragments/common/footer :: footerFragment}"></div>
</body>
</html>
